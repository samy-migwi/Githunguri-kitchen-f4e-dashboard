services:
  app:
    build: .
    container_name: g1_dashboard
    ports:
      -  "5001:8051"
    volumes:
      - .:/src
    command: python src/app.py     
    environment:
      - PYTHONUNBUFFERED=1

  sraper:
      build: .
      container_name: g1_scraper
      ports:
        - "8050:8050"
      volumes:
        - .:/src       
      command: python src/dashex.py
      environment:
        - PYTHONUNBUFFERED=1
  dash:
      build: .
      container_name: main_dashboard
      ports:
        - "8052:8052"
      volumes:
        - .:/src
        #gcp credentials from my local machine to the container
        - ${APPDATA}/gcloud:/root/.config/gcloud
      command: python src/dashboard.py
      environment:
        - PYTHONUNBUFFERED=1